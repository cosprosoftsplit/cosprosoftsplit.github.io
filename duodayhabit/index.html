<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DuoDayHabit</title>
<style>
  :root {
    color-scheme: light dark;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f7f4ef;
    color: #202124;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
  }
  main {
    width: min(760px, calc(100% - 40px));
    padding: 56px 0;
  }
  h1 {
    font-size: clamp(2.5rem, 7vw, 4.7rem);
    line-height: 1;
    margin: 0 0 18px;
  }
  p {
    font-size: 1.15rem;
    line-height: 1.55;
    max-width: 620px;
  }
  ul {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 0;
    margin: 32px 0 0;
    list-style: none;
  }
  a {
    color: #7d3d3d;
    font-weight: 700;
  }
  li a {
    display: inline-block;
    padding: 10px 12px;
    border: 1px solid currentColor;
    border-radius: 8px;
    text-decoration: none;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      background: #151312;
      color: #f5efe7;
    }
    a {
      color: #f2aa8f;
    }
  }
</style>
</head>
<body>
<main>
  <h1>DuoDayHabit</h1>
  <p>Private shared rituals for two people on one device. Plan small routines together, check in pass-and-play, and keep the tone gentle with no account, no sync, no tracking, and no social comparison.</p>

    <li><a href="privacy.html">Privacy</a></li>

  </ul>

</html>
